<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا | أنقى ابتسامة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-navy: #0a2647; /* اللون الكحلي المعتمد */
            --electric-blue: #2c74b3;
            --gold-touch: #d4af37; 
            --target-bg: #a0a7de; 
            
            --insta-grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --snap-color: #fffc00;
            --tiktok-color: #ffffff;
            --whatsapp-color: #25d366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, var(--target-bg) 0%, #3b4278 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            padding: 40px 20px;
        }

        .page-header h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--primary-navy);
            font-weight: 800;
        }

        .page-header p {
            color: #333;
            font-size: 1.1rem;
            margin-bottom: 50px;
            font-weight: 600;
        }

        /* تنسيق الصف الواحد */
        .social-grid {
            display: flex;
            flex-wrap: nowrap; /* إجبار العناصر على البقاء في صف واحد */
            justify-content: center;
            gap: 20px;
            overflow-x: auto; /* للسماح بالتمرير في الشاشات الصغيرة جداً */
            padding-bottom: 20px;
        }

        /* البطاقات باللون الكحلي */
        .social-card {
            flex: 1;
            min-width: 220px;
            background: var(--primary-navy); /* اللون الكحلي */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 20px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .social-card:hover {
            transform: translateY(-12px);
            background: #0d2f5a; /* درجة كحلي أفتح قليلاً عند التمرير */
            border-color: var(--gold-touch);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .social-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
        }

        .instagram::before { background: var(--insta-grad); }
        .snapchat::before { background: var(--snap-color); }
        .tiktok::before { background: var(--tiktok-color); }
        .whatsapp::before { background: var(--whatsapp-color); }

        .social-card i {
            font-size: 45px;
            margin-bottom: 20px;
        }

        .instagram i { color: #fff; }
        .snapchat i { color: var(--snap-color); }
        .tiktok i { color: #fff; }
        .whatsapp i { color: var(--whatsapp-color); }

        .social-card h3 {
            color: #fff;
            font-size: 1.4rem;
            margin-bottom: 8px;
        }

        .username {
            color: var(--gold-touch); /* اسم المستخدم بالذهبي */
            font-size: 0.95rem;
            font-weight: 700;
        }

        .btn-back {
            margin-top: 50px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 45px;
            background: var(--primary-navy);
            color: #fff;
            text-decoration: none;
            border-radius: 15px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: var(--electric-blue);
        }

        /* لضمان استجابة التصميم على الجوال */
        @media (max-width: 992px) {
            .social-grid {
                flex-wrap: wrap; /* العودة للوضع المتعدد في الجوال لسهولة التصفح */
            }
            .social-card {
                flex: none;
                width: 45%;
            }
        }
        
        @media (max-width: 600px) {
            .social-card {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="page-header">
            <h1>تواصل معنا</h1>
            <p>قنوات التواصل الرسمية لعيادة "أنقى ابتسامة"</p>
        </header>

        <div class="social-grid">
            <a href="https://www.instagram.com/puresmile2030" target="_blank" class="social-card instagram">
                <i class="fab fa-instagram"></i>
                <h3>إنستقرام</h3>
                <span class="username">@puresmile2030</span>
            </a>

            <a href="https://www.snapchat.com/add/puresmile2030" target="_blank" class="social-card snapchat">
                <i class="fab fa-snapchat"></i>
                <h3>سناب شات</h3>
                <span class="username">puresmile2030</span>
            </a>

            <a href="https://www.tiktok.com/@puresmile2030" target="_blank" class="social-card tiktok">
                <i class="fab fa-tiktok"></i>
                <h3>تيك توك</h3>
                <span class="username">@puresmile2030</span>
            </a>

            <a href="https://wa.me/message/3Z7JYCW6QBGKG1" target="_blank" class="social-card whatsapp">
                <i class="fab fa-whatsapp"></i>
                <h3>واتساب</h3>
                <span class="username">تواصل الآن</span>
            </a>
        </div>

        <a href="index.html" class="btn-back">
            العودة للرئيسية
            <i class="fas fa-arrow-left"></i>
        </a>
    </div>

</body>
</html>
